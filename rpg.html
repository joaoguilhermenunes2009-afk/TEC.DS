<script>
    let hpBoss = 300;
    let manaBoss = 200;
    let manaHeroi = 100;
    let manaGastaTotal = 0;
    let hpHeroi = 110; 
    let acao;

    console.log("O chefe Surgiu 300hp")
    for (let turno = 1; turno <= 15; turno ++) {
        if (hpBoss <= 0) {
            console.log("O Cachoro foi Derrotado!")
            break;
        }
        //retorna 0, 1 ou 2. Soma para trazer 1, 2 ou 3

        // entrada do usuario
        //acao = Math.floor(Math.random () * 3) + 1
        let = menu = "Escolha sua ação \n"
                + " 1 - Ataque basico \n"
                + " 2 - Skill \n"
                + " 3 - Ultimate \n"
                + " 4 - Fugir \n"
                + " 5 - Não Reagir \n"

        let escolha = prompt (menu);
        let acao = parseInt(escolha);

        console.log("Ação" + acao)
        switch(acao) {
            case 1:
                console.log("Ataque Basico. 20 dano");
                //hpBoss = hpBoss - 20
                hpBoss -=20;
                manaHeroi += 30;
                alert("O cachoro ira atacar.... - 25 de HP");
                hpHeroi -= 25;
                break;
            case 2:
                if (manaHeroi >= 30) {
                    console.log("Skill. 50 dano");
                    hpBoss -=50;
                    manaHeroi -= 30;
                    manaGastaTotal += 30;
                    alert(" O cachoro te mordeu.... pegou Yersinia pestis 25")
                    hpHeroi -=25;
                } else {
                    console.log("Mana insuficiente!")
                }
                break;
            case 3: 
                if (manaGastaTotal >= 50) {
                    console.log("Ultimate. 150 dano");
                    hpBoss -= 150;
                    manaGastaTotal = 0;
                    alert("Yersinia pestis te mordeu!...... 40")
                    hpHeroi -=40;
                } else{
                    console.log("Ultimate não carregado!")
                }
                break;
                case 4 :
                    alert ("Vocr fugui. 0 de dano");
                    alert("\n voce recuperou 40 de vida");
                    hpHeroi += 40;
                    manaBoss += 20;
                    alert("\n O Bos recuperou 20 de vida")
                    hpBoss += 20
                break;
        }
        console.log("HP Boss;" + hpBoss + "Mana" + manaHeroi);
    }
    if (hpBoss <= 0) {
        alert("Vitoria");
    } else {
        alert("Missão Falhou! O BOS continua vivo")
    }
    </script>
